simulation:
  dt: 0.0005
  render: false
  max_steps: 60000

scene:
  base_xml: assets/scene_drilling.xml

controller:
  kp_xy: 2.0
  kd_xy: 0.5
  kp_ori: 0.05
  kd_ori: 0.01
  kz_force: 0.0
  force_damping: 0.0
  kp_null: 0.02
  max_joint_step: 0.02
  damping_lambda: 0.5
  max_z_velocity: 0.0

robot:
  home_q: [0.0, -0.10, 0.25, -0.30, -0.15, 0.0]

drilling:
  approach_offset: 0.12
  predrill_offset: 0.05
  contact_force_threshold: 1.5
  thrust_force_contact: -0.05
  thrust_force_drill: -0.2
  lateral_force_limit: 2.0
  axial_force_limit: 3.0
  retract_distance: 0.03
  spindle_speed_rpm: 5000.0
  dwell_time_s: 0.8
  feed_depth_tolerance: 0.001
  max_retries: 0
  debug_approach_only: true

benchmark:
  output_csv: results/benchmark.csv
  summary_json: results/summary.json
  plots_dir: results/plots
  trials: 1


paths:
  targets_file: assets/targets.json
